<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E se... - Jogo de Festa</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="background-grid"></div>

    <div class="container">
      <h1>E se...</h1>
      
      <div id="game-ui">
        <!-- Tela de Login -->
        <div id="login-screen">
          <div class="field">
            <label>Endereço do Servidor</label>
            <input type="text" id="server-url" value="ws://localhost:3000" />
          </div>
          
          <div class="field">
            <label>Escolha seu Nickname</label>
            <input type="text" id="nickname" placeholder="Ex: Capivara Gamer" maxlength="15" />
          </div>

          <button id="connect-btn">Entrar no Jogo</button>
        </div>

        <!-- Lobby (Aparece após conectar) -->
        <div id="lobby-screen" style="display: none;">
          <div id="room-info" style="text-align: center; margin-bottom: 1rem; color: var(--primary);">
            Aguardando Jogadores...
          </div>
          <div class="player-list" id="player-list">
            <!-- Jogadores entram aqui -->
          </div>
          <div id="host-controls" style="margin-top: 2rem; display: none;">
            <button id="start-btn">Começar Partida</button>
          </div>
        </div>

        <!-- Status / Mensagens -->
        <div id="status"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
