<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E se... - Jogo de Festa</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
      .vote-card {
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        padding: 2rem;
        border-radius: 1.5rem;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        font-size: 1.8rem;
        font-weight: 700;
        width: 100%;
        max-width: 600px;
        margin-bottom: 1.5rem;
      }
      .vote-card:hover {
        border-color: var(--primary);
        background: rgba(0, 210, 255, 0.1);
        transform: scale(1.02);
      }
      .admin-controls {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        display: flex;
        gap: 1rem;
      }
      .kick-btn {
        background: #ff4d4d;
        font-size: 0.8rem;
        padding: 0.5rem;
        max-width: 80px;
      }
    </style>
  </head>
  <body>
    <div class="background-grid"></div>

    <div class="container">
      <h1 id="game-title">E se...</h1>
      
      <!-- TELA: LOGIN -->
      <div id="login-screen" class="game-screen" style="display: flex;">
        <div class="field">
          <label>Servidor</label>
          <input type="text" id="server-url" value="ws://localhost:3000" />
        </div>
        <div class="field">
          <label>Seu Nickname</label>
          <input type="text" id="nickname" placeholder="Nickname" maxlength="15" />
        </div>
        <div class="field" id="admin-field" style="display: none;">
          <label>Senha do Admin</label>
          <input type="password" id="admin-password" placeholder="••••••" />
        </div>
        <button id="connect-btn">Entrar como Jogador</button>
        <button id="admin-mode-btn" style="background: transparent; border: 1px solid var(--primary); margin-top: 1rem; font-size: 0.9rem; padding: 0.8rem;">Entrar como Admin</button>
      </div>

      <!-- TELA: LOBBY -->
      <div id="lobby-screen" class="game-screen">
        <div id="room-info" style="font-size: 1.5rem; margin-bottom: 2rem; color: #888;">Aguardando...</div>
        <div class="player-list" id="player-list"></div>
        <div id="host-controls" style="margin-top: 4rem; display: none;">
          <button id="start-btn">Começar Partida</button>
          <button id="reset-btn" style="background: #444; margin-top: 1rem;">Resetar Tudo</button>
        </div>
      </div>

      <!-- TELA: CRIAR OCASIÃO (PROMPT) -->
      <div id="prompt-screen" class="game-screen">
        <div id="prompt-instruction" style="font-size: 1.5rem; margin-bottom: 2rem;">Você é o mestre! Crie uma ocasião...</div>
        <textarea id="prompt-input" placeholder="E se..."></textarea>
        <button id="submit-prompt-btn" style="margin-top: 2rem;">Enviar Ocasião</button>
      </div>

      <!-- TELA: ENVIAR RESPOSTA (RESPONSE) -->
      <div id="response-screen" class="game-screen">
        <div id="display-prompt" class="prompt-text-display">...</div>
        <div class="field" style="max-width: 600px;">
          <textarea id="response-input" placeholder="Sua resposta criativa..." style="font-size: 1.8rem; min-height: 150px;"></textarea>
        </div>
        <button id="submit-response-btn">Enviar Resposta</button>
      </div>

      <!-- TELA: VOTAÇÃO (VOTING) -->
      <div id="voting-screen" class="game-screen">
        <div style="font-size: 1.5rem; margin-bottom: 2rem; color: var(--primary);">Vote na melhor resposta!</div>
        <div id="voting-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
          <!-- Cartões de voto aqui -->
        </div>
      </div>

      <!-- TELA: ESPERA (WAITING) -->
      <div id="waiting-screen" class="game-screen">
        <div id="waiting-message" style="font-size: 2.5rem; font-weight: 800; text-align: center;">...</div>
      </div>

      <!-- STATUS GLOBAL / ERROS -->
      <div id="status" style="color: #ff4d4d;"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
